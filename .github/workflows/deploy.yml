name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build CMS admin
        continue-on-error: true
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: npx @tinacms/cli build --skip-cloud-checks
      # TinaCloud indexes the schema from the COMMITTED tina-lock.json. If a
      # schema change lands without a regenerated lock, the /admin editor
      # breaks (happened 2026-07-01). The build above regenerates it; this
      # commits it back so the two can never drift.
      - name: Commit regenerated tina-lock.json if it changed
        continue-on-error: true
        run: |
          if ! git diff --quiet tina/tina-lock.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tina/tina-lock.json
            git commit -m "chore: sync tina-lock.json with the schema [skip ci]"
            git pull --rebase origin main
            git push
          fi
      - name: Build site
        run: npx astro build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
