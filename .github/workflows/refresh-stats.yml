name: Refresh stats + deploy

# Free daily refresh of Wickie's cross-platform numbers, then rebuild the
# site. Also runnable on demand from the Actions tab. The fetch never fails
# the build — if a platform is unreachable, its last good value is kept.

on:
  schedule:
    - cron: '0 13 * * *' # ~09:00 ET daily
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Refresh stats
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: node scripts/fetch-stats.mjs
      - name: Commit refreshed stats (if changed)
        run: |
          git config user.name "wickie-stats-bot"
          git config user.email "charlie-phinney@users.noreply.github.com"
          git add src/data/stats.json
          if git diff --staged --quiet; then
            echo "No stat changes."
          else
            git commit -m "chore: refresh cross-platform stats [skip ci]"
            git push
          fi
      - name: Install dependencies
        run: npm ci
      - name: Build CMS admin
        continue-on-error: true
        env:
          TINA_PUBLIC_CLIENT_ID: ${{ secrets.TINA_PUBLIC_CLIENT_ID }}
          TINA_TOKEN: ${{ secrets.TINA_TOKEN }}
        run: npx @tinacms/cli build --skip-cloud-checks
      - name: Build site
        run: npx astro build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
