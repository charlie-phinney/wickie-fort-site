name: Refresh stats + deploy

# Free daily refresh of Wickie's cross-platform numbers. Also runnable on
# demand from the Actions tab. If a platform is unreachable its last good
# value is kept, so the site never shows a broken number.
#
# This workflow only updates src/data/stats.json. It then DISPATCHES the
# main deploy workflow rather than duplicating the build pipeline here —
# pushes made with GITHUB_TOKEN don't trigger `on: push` workflows, which is
# why the old version had its own copy of the build (and drifted from it).

on:
  schedule:
    - cron: '0 13 * * *' # ~09:00 ET daily
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Refresh stats
        env:
          IG_TOKEN: ${{ secrets.IG_TOKEN }}
          IG_USER_ID: ${{ secrets.IG_USER_ID }}
        run: node scripts/fetch-stats.mjs
      - name: Commit and deploy (if changed)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add src/data/stats.json
          if git diff --staged --quiet; then
            echo "No stat changes."
            exit 0
          fi
          git config user.name "wickie-stats-bot"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: refresh cross-platform stats [skip ci]"
          # Wickie saves to main at any hour — retry around her commits.
          ok=""
          for i in 1 2 3; do
            if git pull --rebase origin main && git push; then ok=1; break; fi
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          if [ -z "$ok" ]; then
            echo "::error::Could not push refreshed stats after 3 attempts."
            exit 1
          fi
          gh workflow run deploy.yml --ref main
